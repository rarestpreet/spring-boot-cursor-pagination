spring:
  application:
    name: Cursor_pagination

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/cursor_pagination_db?createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASS}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: ${PORT:8080}

prod:
  host: ${PROD_HOST:localhost}